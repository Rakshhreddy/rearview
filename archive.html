<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rearview</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="app">

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Rearview</span>
        <span class="brand-version">0.2</span>
      </div>

      <nav class="ranges" role="tablist" aria-label="Time range">
        <button class="range" role="tab" data-range="7">7d</button>
        <button class="range is-active" role="tab" aria-selected="true" data-range="30">30d</button>
        <button class="range" role="tab" data-range="90">90d</button>
        <button class="range" role="tab" data-range="365">1y</button>
      </nav>

      <div class="meta" id="meta">
        <span class="meta-num" id="meta-visits">0</span>
        <span class="meta-label">visits</span>
        <span class="meta-sep">/</span>
        <span class="meta-num" id="meta-sites">0</span>
        <span class="meta-label">sites</span>
      </div>
    </header>

    <section class="grid">

      <article class="card card-rhythms" id="card-rhythms">
        <header class="card-head">
          <span class="card-num">i</span>
          <h2 class="card-title">Rhythms</h2>
          <span class="card-sub">when you browse</span>
        </header>
        <div class="card-body">
          <div id="rhythms" class="rhythms"></div>
        </div>
        <footer class="card-foot">
          <span class="foot-label">peak</span>
          <span class="foot-value" id="peak-label">&mdash;</span>
        </footer>
      </article>

      <article class="card card-cats" id="card-cats">
        <header class="card-head">
          <span class="card-num">ii</span>
          <h2 class="card-title">Categories</h2>
          <span class="card-sub">where attention goes</span>
        </header>
        <div class="card-body card-body-cats">
          <div id="breakdown" class="breakdown"></div>
        </div>
        <footer class="card-foot">
          <span class="foot-label">hover a row</span>
          <span class="foot-value">to reveal top sites</span>
        </footer>
      </article>

    </section>

    <footer class="appfoot">
      <span class="foot-meta">local only &middot; nothing leaves this tab</span>
      <span class="foot-status" id="status">reading history</span>
    </footer>

  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
