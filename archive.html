<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rearview</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="app">

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Rearview</span>
      </div>
    </header>

    <section class="stage">

      <div class="hero">
        <span class="hero-tag">most time on</span>
        <div class="hero-bead" id="hero-bead"></div>
        <div class="hero-foot">
          <span class="hero-pct" id="hero-pct">0%</span>
          <span class="hero-of">of the past 14 days</span>
        </div>
      </div>

      <div class="screen-wrap">
        <div class="shell">
          <div class="screen">
            <div id="device" class="device"></div>
          </div>
        </div>
        <div class="tooltip" id="tooltip"></div>
      </div>

      <nav class="nav">
        <button class="pill prev" id="prev-btn" aria-label="Previous 14 days">
          <span class="pill-arrow">&larr;</span>
        </button>
        <span class="nav-range" id="range">&nbsp;</span>
        <button class="pill next" id="next-btn" aria-label="Next 14 days">
          <span class="pill-arrow">&rarr;</span>
        </button>
      </nav>

    </section>

    <footer class="appfoot">
      <span class="foot-meta">rearview / 0.14</span>
      <span class="foot-status">hover, sweep across the squares</span>
    </footer>

  </main>

  <script type="module" src="src/main.js"></script>
</body>
</html>
